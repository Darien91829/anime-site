<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AnimeStream - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <!-- Use any placeholder logo image -->
      <img src="assets/logos/logo.png" alt="AnimeStream logo" />
      <span class="logo-text">AnimeStream</span>
    </div>

    <nav class="nav">
      <a href="index.html" class="nav-link active">Home</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="login.html" class="nav-link nav-link-button">Login</a>
    </nav>
  </header>

  <!-- Main content -->
  <main class="main">
    <!-- Hero section -->
    <section class="hero">
      <h1 class="hero-title">Stream Your Favorite Anime</h1>
      <p class="hero-subtitle">Modern dark UI. Built for learning web development.</p>
    </section>

    <!-- Anime grid section -->
    <section class="anime-section">
      <h2 class="section-title">Popular Anime</h2>
      <!-- Cards will be injected here by app.js -->
      <div id="anime-grid" class="anime-grid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 AnimeStream — Learning project only.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
